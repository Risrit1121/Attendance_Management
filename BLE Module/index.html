<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #qrcode {
            margin: 20px 0;
            padding: 16px;
            background: white;
            border: 2px solid #eee;
            border-radius: 8px;
        }
        .status {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
        }
        .hash-display {
            font-family: monospace;
            background: #eee;
            padding: 4px 8px;
            border-radius: 4px;
            color: #d63384;
        }
        .loader {
            width: 100%;
            height: 4px;
            background: #eee;
            margin-top: 15px;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loader-bar {
            height: 100%;
            background: #007bff;
            width: 0%;
            transition: width 5s linear; /* Matches the 5 second interval */
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Class Attendance QR</h2>
        <p>Class ID: <strong id="class-id-display">1</strong></p>
        
        <div id="qrcode"></div>
        
        <div class="status" id="status">Initializing...</div>
        
        <div class="loader">
            <div class="loader-bar" id="loader-bar"></div>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = "https://ble-qr-microservice.onrender.com/qr/generate";
        const CLASS_ID = "1"; // Change this if you want to test different class IDs
        const REFRESH_INTERVAL_MS = 5000;

        // UI Elements
        const qrContainer = document.getElementById("qrcode");
        const statusText = document.getElementById("status");
        const loaderBar = document.getElementById("loader-bar");
        document.getElementById("class-id-display").innerText = CLASS_ID;

        // Initialize QR Code generator
        const qrCode = new QRCode(qrContainer, {
            text: "Loading...",
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Function to fetch new hash and update QR
        async function updateQRCode() {
            try {
                // Reset the loader animation
                loaderBar.style.transition = "none";
                loaderBar.style.width = "0%";
                
                // Allow browser to register the reset before starting animation
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        loaderBar.style.transition = `width ${REFRESH_INTERVAL_MS}ms linear`;
                        loaderBar.style.width = "100%";
                    });
                });

                // Make API Call
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ class_id: CLASS_ID })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Update QR Code
                    qrCode.clear(); // Clear previous
                    qrCode.makeCode(data.hash); // Draw new
                    
                    // Update Status Text
                    statusText.innerHTML = `Active Hash: <span class="hash-display">${data.hash}</span><br>Expires in: ${data.expires_in}s`;
                } else {
                    const errText = await response.text();
                    statusText.innerHTML = `<span style="color:red">HTTP Error ${response.status}: ${errText}</span>`;
                }

            } catch (error) {
                console.error("Failed to generate QR:", error);
                statusText.innerHTML = `<span style="color:red">Network Error: Is the backend running?</span>`;
            }
        }

        // Run immediately on load, then set interval
        updateQRCode();
        setInterval(updateQRCode, REFRESH_INTERVAL_MS);

    </script>
</body>
</html>
