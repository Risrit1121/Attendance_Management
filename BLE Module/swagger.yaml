swagger: "2.0"
info:
  title: Beacon API
  version: "1.0"

host: localhost:4040
basePath: /
schemes:
  - http

paths:

  /getMinor:
    get:
      summary: Get minor for a given major
      parameters:
        - name: major
          in: query
          required: true
          type: integer
      responses:
        200:
          description: Minor value returned
          schema:
            type: string
            example: "52344"
        400:
          description: Missing major
          schema:
            type: string
            example: "missing major"

  /validate:
    get:
      summary: Validate major-minor pair
      parameters:
        - name: major
          in: query
          required: true
          type: integer
        - name: minor
          in: query
          required: true
          type: integer
      responses:
        200:
          description: Validation result
          schema:
            type: object
            properties:
              valid:
                type: boolean
                example: true
        400:
          description: Missing parameters
          schema:
            type: object
            properties:
              valid:
                type: boolean
                example: false
              error:
                type: string
                example: missing major or minor