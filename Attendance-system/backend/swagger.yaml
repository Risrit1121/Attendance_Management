openapi: 3.0.3
info:
  title: DIAMS API
  description: |
    **Digital Intelligent Attendance Management System**

    REST API for managing attendance sessions, courses, and users.
    Supports three attendance methods: BLE beacon, QR code, and Manual,
    with automatic HMAC fallback when external microservices are unavailable.

    ## Authentication
    All protected routes require:
    ```
    Authorization: Bearer <JWT>
    ```
    Obtain a token via `POST /login`.

    ## Roles
    | Role | Description |
    |------|-------------|
    | `admin` | Full system access |
    | `prof` | Own courses only |
    | `ta` | Same as prof on assigned courses |
    | `student` | Mobile app only — limited to own data |

    ## Timezone
    All schedule times (`startTime`, `endTime`, `scheduledDay`) are **IST strings**.
    Lecture `scheduledTime` is stored and returned as **UTC**.
  version: "2.0.0"
  contact:
    name: DIAMS Backend

servers:
  - url: http://localhost:4040
    description: Local development
  - url: https://your-production-host
    description: Production

tags:
  - name: Auth
  - name: Courses
  - name: Sessions
  - name: Attendance
  - name: Analytics
  - name: Admin
  - name: BLE & QR
  - name: Student

# ── Security ────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── User ──────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, example: prof@example.com }
        password: { type: string, example: secret }

    LoginResponse:
      type: object
      properties:
        user_id:  { type: string }
        name:     { type: string }
        role:     { type: string, enum: [admin, prof, ta, student] }
        token:    { type: string, description: JWT }

    # ── Course ────────────────────────────────────────────────────────────────
    Schedule:
      type: object
      properties:
        scheduledDay: { type: string, example: Monday }
        startTime:    { type: string, example: "09:00" }
        endTime:      { type: string, example: "09:50" }
        method:       { type: string, enum: [BLE, QRCode, Manual] }
        switch:       { type: boolean, description: Whether the method can be switched mid-session }

    Lecture:
      type: object
      properties:
        lectureUID:    { type: string }
        scheduledTime: { type: string, format: date-time, description: UTC }
        cancelled:     { type: boolean }

    Course:
      type: object
      properties:
        _id:         { type: string, example: CS101 }
        id:          { type: string, description: Alias for _id returned by API }
        name:        { type: string }
        department:  { type: string }
        slot:        { type: string, example: A }
        venue:       { type: string }
        startDate:   { type: string, format: date }
        endDate:     { type: string, format: date }
        instructors: { type: array, items: { type: string } }
        tas:         { type: array, items: { type: string } }
        lectures:    { type: array, items: { $ref: '#/components/schemas/Lecture' } }
        schedules:   { type: array, items: { $ref: '#/components/schemas/Schedule' } }

    CourseCreate:
      type: object
      required: [_id, name]
      properties:
        _id:         { type: string }
        name:        { type: string }
        department:  { type: string }
        slot:        { type: string }
        venue:       { type: string }
        startDate:   { type: string, format: date }
        endDate:     { type: string, format: date }
        instructors: { type: array, items: { type: string } }
        tas:         { type: array, items: { type: string } }

    # ── Session ───────────────────────────────────────────────────────────────
    Session:
      type: object
      properties:
        session_id:      { type: string, description: Alias for sessionUID }
        sessionUID:      { type: string, format: uuid }
        course:          { type: string }
        lectureUID:      { type: string }
        scheduledTime:   { type: string, format: date-time }
        duration:        { type: integer, description: Minutes — used as auto-expiry backstop for manual sessions }
        method:          { type: string, enum: [BLE, QRCode, Manual] }
        isAutoGenerated: { type: boolean }
        active:          { type: boolean }
        endedAt:         { type: string, format: date-time, nullable: true }
        timestamp:       { type: string, format: date-time }

    SessionStart:
      type: object
      required: [course_id, mode]
      properties:
        course_id:  { type: string, example: CS101 }
        mode:       { type: string, enum: [BLE, QRCode, Manual] }
        lectureUID: { type: string, description: "Optional — if provided, backend uses it directly (avoids ad-hoc duplicate creation)" }

    # ── Attendance ────────────────────────────────────────────────────────────
    AttendanceRecord:
      type: object
      properties:
        sessionUID:  { type: string }
        student:     { type: string }
        timestamp:   { type: string, format: date-time }
        markedAt:    { type: string, format: date-time, nullable: true }
        verifiedVia: { type: string, enum: [BLE, QRCode, Manual] }

    # ── Analytics ─────────────────────────────────────────────────────────────
    LectureStat:
      type: object
      properties:
        lectureUID:    { type: string }
        scheduledTime: { type: string, format: date-time }
        totalStudents: { type: integer }
        present:       { type: integer }
        percentage:    { type: number }

    CourseAnalytics:
      type: object
      properties:
        courseId:      { type: string }
        courseName:    { type: string }
        totalLectures: { type: integer }
        sessionsHeld:  { type: integer }
        lectures:      { type: array, items: { $ref: '#/components/schemas/LectureStat' } }

    StudentCourseStat:
      type: object
      properties:
        courseId:      { type: string }
        courseName:    { type: string }
        totalLectures: { type: integer }
        sessionsHeld:  { type: integer }
        attended:      { type: integer }
        attendancePct: { type: number }
        fromCache:     { type: boolean }

    # ── Student ───────────────────────────────────────────────────────────────
    StudentProfile:
      type: object
      properties:
        _id:      { type: string }
        name:     { type: string }
        email:    { type: string }
        imageURL: { type: string }

    LectureHistory:
      type: object
      properties:
        lectureUID:    { type: string }
        scheduledTime: { type: string, format: date-time }
        sessionCount:  { type: integer }
        attended:      { type: boolean, description: True only if student was marked in ALL sessions of this lecture }
        sessions:
          type: array
          items:
            type: object
            properties:
              sessionUID:  { type: string }
              method:      { type: string }
              timestamp:   { type: string, format: date-time }
              marked:      { type: boolean }
              verifiedVia: { type: string, nullable: true }

    # ── BLE / QR ─────────────────────────────────────────────────────────────
    Beacon:
      type: object
      properties:
        major:  { type: string }
        minor:  { type: string }
        rssi:   { type: integer }

    # ── Errors ────────────────────────────────────────────────────────────────
    Error:
      type: object
      properties:
        error: { type: string }

security:
  - bearerAuth: []

# ── Paths ───────────────────────────────────────────────────────────────────────
paths:

  # ── Auth ────────────────────────────────────────────────────────────────────
  /login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /logout:
    post:
      tags: [Auth]
      summary: Logout (client-side token discard)
      security: []
      responses:
        "200":
          description: Logged out

  # ── Courses ─────────────────────────────────────────────────────────────────
  /courses:
    get:
      tags: [Courses]
      summary: List courses for authenticated user
      parameters:
        - in: query
          name: user
          schema: { type: string }
          description: User ID — admin can omit to get all
      responses:
        "200":
          description: Array of courses
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Course' }

    post:
      tags: [Courses]
      summary: Create course (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CourseCreate' }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Course' }

  /courses/{courseId}:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }

    get:
      tags: [Courses]
      summary: Get course detail
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Course' }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    put:
      tags: [Courses]
      summary: Update course (admin)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CourseCreate' }
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Course' }

    delete:
      tags: [Courses]
      summary: Delete course (admin)
      responses:
        "200":
          description: Deleted

  /courses/{courseId}/schedules:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    get:
      tags: [Courses]
      summary: Get schedules for course
      responses:
        "200":
          description: Schedule array
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Schedule' }

  /courses/{courseId}/schedule:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }

    post:
      tags: [Courses]
      summary: Add schedule entry (instructor only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Schedule' }
      responses:
        "201":
          description: Schedule added

    put:
      tags: [Courses]
      summary: Replace entire schedules array (instructor only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schedules:
                  type: array
                  items: { $ref: '#/components/schemas/Schedule' }
      responses:
        "200":
          description: Schedules replaced

  /courses/{courseId}/schedule/{index}:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
      - in: path
        name: index
        required: true
        schema: { type: integer }

    patch:
      tags: [Courses]
      summary: Update specific schedule entry (instructor only)
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Schedule' }
      responses:
        "200":
          description: Updated

    delete:
      tags: [Courses]
      summary: Remove schedule entry (instructor only)
      responses:
        "200":
          description: Deleted

  /courses/{courseId}/lectures/{lectureUID}/cancel:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
      - in: path
        name: lectureUID
        required: true
        schema: { type: string }
    patch:
      tags: [Courses]
      summary: Cancel lecture — ends any active sessions immediately
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:        { type: string }
                  sessionsClosed: { type: integer }
        "404":
          description: Lecture not found

  /courses/{courseId}/lectures/{lectureUID}/uncancel:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
      - in: path
        name: lectureUID
        required: true
        schema: { type: string }
    patch:
      tags: [Courses]
      summary: Reinstate cancelled lecture
      responses:
        "200":
          description: Reinstated

  # ── Sessions ────────────────────────────────────────────────────────────────
  /sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      parameters:
        - in: query
          name: course
          schema: { type: string }
          description: Filter by course ID
      responses:
        "200":
          description: Session array
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Session' }

    post:
      tags: [Sessions]
      summary: Start new session
      description: |
        Pass `lectureUID` when known (SchedulerContext always does) to avoid
        the backend's ad-hoc lecture creation path. Without it, the backend
        finds the closest scheduled lecture within ±30 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SessionStart' }
      responses:
        "201":
          description: Session started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        "409":
          description: Active session already exists for this lecture
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:      { type: string }
                  session_id: { type: string }

  /sessions/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
        description: sessionUID
    get:
      tags: [Sessions]
      summary: Get session detail
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }

  /sessions/{id}/end:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    put:
      tags: [Sessions]
      summary: End session explicitly
      responses:
        "200":
          description: Session ended

  /sessions/{courseId}/active:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    get:
      tags: [Sessions]
      summary: Get active session for a course
      responses:
        "200":
          description: Active session or empty object
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }

  # ── Attendance ──────────────────────────────────────────────────────────────
  /attendance/mark:
    post:
      tags: [Attendance]
      summary: Mark attendance (generic dispatcher)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id: { type: string }
                student_id: { type: string }
      responses:
        "200":
          description: Marked

  /attendance/{courseId}:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    get:
      tags: [Attendance]
      summary: All attendance records for course
      responses:
        "200":
          description: Records
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AttendanceRecord' }

  /attendance/manual:
    post:
      tags: [Attendance]
      summary: Manually mark one student present (prof/TA)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [session_id, student_id]
              properties:
                session_id: { type: string }
                student_id: { type: string }
      responses:
        "200":
          description: Marked

  /attendance/bulk:
    post:
      tags: [Attendance]
      summary: Bulk manual mark (prof/TA)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [sessionUID, student_ids]
              properties:
                sessionUID:  { type: string }
                student_ids: { type: array, items: { type: string } }
      responses:
        "200":
          description: Marked count
          content:
            application/json:
              schema:
                type: object
                properties:
                  marked: { type: integer }

  # ── Analytics ───────────────────────────────────────────────────────────────
  /analytics/course/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [Analytics]
      summary: Per-lecture attendance breakdown for course
      responses:
        "200":
          description: Course analytics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CourseAnalytics' }

  /analytics/professor:
    get:
      tags: [Analytics]
      summary: Summary across all professor's courses
      responses:
        "200":
          description: Array of course stats

  /analytics/admin:
    get:
      tags: [Analytics]
      summary: System-wide analytics (admin only)
      responses:
        "200":
          description: System stats

  /analytics/at-risk:
    get:
      tags: [Analytics]
      summary: Students below AT_RISK_THRESHOLD
      parameters:
        - in: query
          name: courseId
          schema: { type: string }
      responses:
        "200":
          description: At-risk students

  # ── Admin ───────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      tags: [Admin]
      summary: System-wide counts
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  students:      { type: integer }
                  professors:    { type: integer }
                  courses:       { type: integer }
                  sessions:      { type: integer, description: Currently active sessions }
                  totalSessions: { type: integer }
                  enrollments:   { type: integer }
                  attendance:    { type: integer }
                  avg_attendance:{ type: number }

  /admin/users:
    get:
      tags: [Admin]
      summary: All users with roles
      responses:
        "200":
          description: User array

  /admin/courses:
    get:
      tags: [Admin]
      summary: All courses with enrolment counts
      responses:
        "200":
          description: Course array

  /admin/sessions:
    get:
      tags: [Admin]
      summary: All sessions (newest first)
      responses:
        "200":
          description: Session array

  /admin/professors:
    post:
      tags: [Admin]
      summary: Create professor
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [_id, name, email, password]
              properties:
                _id:        { type: string }
                name:       { type: string }
                email:      { type: string }
                password:   { type: string }
                department: { type: string }
      responses:
        "201":
          description: Created

  /admin/professors/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    delete:
      tags: [Admin]
      summary: Delete professor
      responses:
        "200":
          description: Deleted

  /admin/students:
    post:
      tags: [Admin]
      summary: Create student
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [_id, name, email, password]
              properties:
                _id:      { type: string }
                name:     { type: string }
                email:    { type: string }
                password: { type: string }
                imageURL: { type: string }
      responses:
        "201":
          description: Created

  /admin/students/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    delete:
      tags: [Admin]
      summary: Delete student
      responses:
        "200":
          description: Deleted

  /admin/enroll:
    post:
      tags: [Admin]
      summary: Enrol student in course
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [student, course]
              properties:
                student: { type: string }
                course:  { type: string }
      responses:
        "201":
          description: Enrolled

  /admin/enroll/bulk:
    post:
      tags: [Admin]
      summary: Bulk enrol students
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [course, student_ids]
              properties:
                course:      { type: string }
                student_ids: { type: array, items: { type: string } }
      responses:
        "200":
          description: Enrolled count

  /admin/unenroll:
    post:
      tags: [Admin]
      summary: Drop student from course (sets status to Dropped)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                student: { type: string }
                course:  { type: string }
      responses:
        "200":
          description: Unenrolled

  /admin/enrollments/{courseId}:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    get:
      tags: [Admin]
      summary: Enrolled students for a course
      responses:
        "200":
          description: Student array

  /admin/student/{studentId}/analytics:
    parameters:
      - in: path
        name: studentId
        required: true
        schema: { type: string }
    get:
      tags: [Admin]
      summary: Per-student analytics (bucket-backed with live fallback)
      responses:
        "200":
          description: Student analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  studentId: { type: string }
                  student:   { $ref: '#/components/schemas/StudentProfile' }
                  cached:    { type: boolean }
                  courses:
                    type: array
                    items: { $ref: '#/components/schemas/StudentCourseStat' }

  /admin/courses/{courseId}/tas:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    post:
      tags: [Admin]
      summary: Add TA to course
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                student_id: { type: string }
      responses:
        "200":
          description: TA added

  /admin/courses/{courseId}/tas/{studentId}:
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
      - in: path
        name: studentId
        required: true
        schema: { type: string }
    delete:
      tags: [Admin]
      summary: Remove TA from course
      responses:
        "200":
          description: TA removed

  /admin/classrooms:
    get:
      tags: [Admin]
      summary: List classrooms
      responses:
        "200":
          description: Classroom array
    post:
      tags: [Admin]
      summary: Create classroom
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                _id:      { type: string }
                name:     { type: string }
                capacity: { type: integer }
                floor:    { type: string }
      responses:
        "201":
          description: Created

  /admin/beacons:
    get:
      tags: [Admin]
      summary: List BLE beacons
      responses:
        "200":
          description: Beacon array
    post:
      tags: [Admin]
      summary: Register BLE beacon
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bleID:     { type: string }
                classroom: { type: string }
      responses:
        "201":
          description: Created

  /admin/csv/bulk-create:
    post:
      tags: [Admin]
      summary: CSV bulk create
      description: |
        Multipart form upload. `type` field must be one of: `students`, `professors`, `courses`, `enrollments`.

        CSV column headers per type:
        - **students**: `_id,name,email,password,imageURL`
        - **professors**: `_id,name,email,password,department`
        - **courses**: `_id,name,department,slot,venue,startDate,endDate,instructors,tas`
        - **enrollments**: `student,course`
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type: { type: string }
                file: { type: string, format: binary }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  created: { type: integer }
                  skipped: { type: integer }
                  errors:  { type: array, items: { type: string } }

  /admin/csv/bulk-delete:
    post:
      tags: [Admin]
      summary: CSV bulk delete
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                type: { type: string }
                file: { type: string, format: binary }
      responses:
        "200":
          description: Deleted count

  /admin/backup:
    post:
      tags: [Admin]
      summary: Trigger manual database backup
      responses:
        "200":
          description: Backup triggered

  /admin/rebuild-buckets:
    post:
      tags: [Admin]
      summary: Rebuild all attendance cache buckets
      responses:
        "200":
          description: Rebuild started

  # ── BLE & QR ────────────────────────────────────────────────────────────────
  /getMinor:
    get:
      tags: [BLE & QR]
      summary: Get rotating BLE minor for ESP32
      description: Falls back to local HMAC (30-second window) when microservice unavailable.
      parameters:
        - in: query
          name: major
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Minor value
          content:
            application/json:
              schema:
                type: object
                properties:
                  minor:     { type: string }
                  expiresIn: { type: integer, description: Seconds }
                  major:     { type: string }
                  fallback:  { type: boolean }

  /ble/validate:
    post:
      tags: [BLE & QR]
      summary: Validate BLE beacons and mark attendance
      description: |
        Proxies to BLE microservice. Falls back to DB beacon lookup on service unavailability.
        Attendance marked idempotently (upsert).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, beacons]
              properties:
                session_id: { type: string }
                beacons:
                  type: array
                  items: { $ref: '#/components/schemas/Beacon' }
      responses:
        "200":
          description: Attendance marked
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:    { type: boolean }
                  message:  { type: string }
                  fallback: { type: boolean }
        "400":
          description: Validation failed
        "403":
          description: Not enrolled
        "404":
          description: No active BLE session

  /getQR/{sessionId}:
    parameters:
      - in: path
        name: sessionId
        required: true
        schema: { type: string }
    get:
      tags: [BLE & QR]
      summary: Get current QR hash (rotates every 5 seconds)
      description: Falls back to local HMAC when QR microservice is unavailable.
      responses:
        "200":
          description: QR hash
          content:
            application/json:
              schema:
                type: object
                properties:
                  qr:        { type: string }
                  expiresIn: { type: integer, description: Milliseconds until next rotation }
                  sessionId: { type: string }
                  source:    { type: string, enum: [service, fallback] }

  /qr/validate:
    post:
      tags: [BLE & QR]
      summary: Validate QR hash and mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, hash]
              properties:
                session_id: { type: string }
                hash:       { type: string }
      responses:
        "200":
          description: Attendance marked
        "400":
          description: Invalid hash or wrong session method
        "403":
          description: Not enrolled

  # ── Student ─────────────────────────────────────────────────────────────────
  /student/{studentId}/profile:
    parameters:
      - in: path
        name: studentId
        required: true
        schema: { type: string }
    get:
      tags: [Student]
      summary: Student profile (no password)
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StudentProfile' }

  /student/{studentId}/courses:
    parameters:
      - in: path
        name: studentId
        required: true
        schema: { type: string }
    get:
      tags: [Student]
      summary: Enrolled courses with lecture-attended counts (bucket-backed)
      responses:
        "200":
          description: Course summary array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    courseId:         { type: string }
                    lecturesAttended: { type: integer }

  /student/{studentId}/history/{courseId}:
    parameters:
      - in: path
        name: studentId
        required: true
        schema: { type: string }
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    get:
      tags: [Student]
      summary: Per-lecture attendance history for a course
      description: |
        Returns attendance computed using the **intersection** model:
        a student is counted present for a lecture only if they appear in
        ALL sessions of that lecture.
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: object
                properties:
                  studentId:  { type: string }
                  courseId:   { type: string }
                  attended:   { type: integer }
                  total:      { type: integer }
                  percentage: { type: number }
                  history:
                    type: array
                    items: { $ref: '#/components/schemas/LectureHistory' }
