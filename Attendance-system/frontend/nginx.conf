server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;

    # ── Proxy /api/* → backend ────────────────────────────────────────────────
    # Strips the /api prefix before forwarding, so POST /api/login becomes
    # POST /login on the backend.
    location /api/ {
        proxy_pass         http://backend:4040/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Cache-busted assets (Vite fingerprints them) ─────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — all unknown paths serve index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}