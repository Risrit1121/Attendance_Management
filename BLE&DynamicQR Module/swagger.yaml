openapi: 3.0.0
info:
  title: Attendance Service API
  version: 1.0.0
  description: BLE and QR based attendance system

servers:
  - url: http://localhost:8000

paths:

  /ble/generate-minor:
    post:
      summary: Generate minor for BLE device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - major_id
              properties:
                major_id:
                  type: string
                  example: abc123
      responses:
        '200':
          description: Minor generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  minor:
                    type: string
                    example: "1721"
                  expires_in:
                    type: integer
                    example: 45

  /ble/validate:
    post:
      summary: Validate BLE attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - class_id
                - beacons
              properties:
                class_id:
                  type: string
                  example: CS101
                beacons:
                  type: array
                  items:
                    type: object
                    required:
                      - major
                      - minor
                      - rssi
                    properties:
                      major:
                        type: string
                        example: abc123
                      minor:
                        type: string
                        example: "1721"
                      rssi:
                        type: integer
                        example: -68
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true

  /qr/generate:
    post:
      summary: Generate QR hash for class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - class_id
              properties:
                class_id:
                  type: string
                  example: CS101
      responses:
        '200':
          description: QR hash generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:
                    type: string
                    example: a1b2c3d4
                  expires_in:
                    type: integer
                    example: 15

  /qr/validate:
    post:
      summary: Validate QR attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - class_id
                - hash
                - timestamp
              properties:
                class_id:
                  type: string
                  example: CS101
                hash:
                  type: string
                  example: a1b2c3d4
                timestamp:
                  type: integer
                  example: 1712770000000
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true